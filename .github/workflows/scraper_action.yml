name: Doctor Scraper Persistence

on:
  schedule:
    - cron: '0 */6 * * *' # Пуска се на всеки 6 часа, бе палавник!
  workflow_dispatch: 

jobs:
  scrape_job:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Python environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4

      - name: Execute Scraper
        run: python scraper.py

      - name: Commit and Push results
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git add ultimate_doctors_data.csv state.json
          
          git commit -m "Автоматично обновяване на данни и прогрес - $(date)" || echo "Няма нови данни за запис"
          
          git push
