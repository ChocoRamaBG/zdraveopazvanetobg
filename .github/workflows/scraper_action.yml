name: Doctor Scraper Persistence

on:
  schedule:
    - cron: '0 0 * * *' # Пуска се автоматично веднъж на 24 часа
  workflow_dispatch: # Позволява ти да го пуснеш ръчно, когато си поискаш

jobs:
  scrape_job:
    runs-on: ubuntu-latest
    
    # КРИТИЧНО: Трябва ни разрешение да пишем обратно в репозиторито
    permissions:
      contents: write

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Python environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4

      - name: Execute Scraper
        run: python scraper.py

      - name: Commit and Push results
        run: |
          # Конфигуриране на Git за автоматичния бот
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Добавяме CSV файла и файла със състоянието (прогреса)
          git add ultimate_doctors_data.csv state.json
          
          # Комитваме само ако има промени, за да не гърми workflow-а
          git commit -m "Автоматично обновяване на данни и прогрес - $(date)" || echo "Няма нови данни за запис"
          
          # Пушваме обратно в главния бранч
          git push
